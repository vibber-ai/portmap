name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          config-file: ".github/release-please-config.json"
          manifest-file: ".github/.release-please-manifest.json"

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: portmap-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: portmap-aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: portmap-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: portmap-aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz portmap
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  upload:
    needs: [release-please, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create checksums
        run: sha256sum portmap-*.tar.gz > checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} portmap-*.tar.gz checksums.txt --repo ${{ github.repository }}

  update-homebrew:
    needs: [release-please, upload]
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download ${{ needs.release-please.outputs.tag_name }} --pattern checksums.txt --repo ${{ github.repository }} --dir /tmp

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: vibber-ai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${TAG#portmap-v}"

          SHA_AARCH64_DARWIN=$(grep aarch64-apple-darwin /tmp/checksums.txt | awk '{print $1}')
          SHA_X86_64_DARWIN=$(grep x86_64-apple-darwin /tmp/checksums.txt | awk '{print $1}')
          SHA_AARCH64_LINUX=$(grep aarch64-unknown-linux /tmp/checksums.txt | awk '{print $1}')
          SHA_X86_64_LINUX=$(grep x86_64-unknown-linux /tmp/checksums.txt | awk '{print $1}')

          cat > Formula/portmap.rb << FORMULA
          class Portmap < Formula
            desc "Map names to localhost ports. Made for agents and humans."
            homepage "https://github.com/vibber-ai/portmap"
            version "$VERSION"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/vibber-ai/portmap/releases/download/$TAG/portmap-aarch64-apple-darwin.tar.gz"
                sha256 "$SHA_AARCH64_DARWIN"
              end

              on_intel do
                url "https://github.com/vibber-ai/portmap/releases/download/$TAG/portmap-x86_64-apple-darwin.tar.gz"
                sha256 "$SHA_X86_64_DARWIN"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/vibber-ai/portmap/releases/download/$TAG/portmap-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "$SHA_AARCH64_LINUX"
              end

              on_intel do
                url "https://github.com/vibber-ai/portmap/releases/download/$TAG/portmap-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "$SHA_X86_64_LINUX"
              end
            end

            def install
              bin.install "portmap"
            end

            service do
              run [opt_bin/"portmap", "serve", "--listen", "1337"]
              keep_alive true
              log_path var/"log/portmap.log"
              error_log_path var/"log/portmap.log"
            end

            def caveats
              <<~EOS
                To start portmap as a background service:
                  brew services start portmap

                To stop before uninstalling:
                  brew services stop portmap
              EOS
            end

            test do
              assert_match "portmap", shell_output("#{bin}/portmap --help")
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/portmap.rb

      - name: Create PR in tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          BRANCH="portmap-${{ needs.release-please.outputs.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/portmap.rb
          git commit -m "feat: update portmap to ${{ needs.release-please.outputs.tag_name }}"
          git push origin "$BRANCH"
          gh pr create --repo vibber-ai/homebrew-tap \
            --title "Update portmap to ${{ needs.release-please.outputs.tag_name }}" \
            --body "Automated formula update from [portmap release](https://github.com/vibber-ai/portmap/releases/tag/${{ needs.release-please.outputs.tag_name }})." \
            --head "$BRANCH"
